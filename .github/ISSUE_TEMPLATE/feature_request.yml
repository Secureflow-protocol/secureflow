name: Feature Request
description: Suggest an idea for SecureFlow
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see implemented?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project would this affect?
      options:
        - Frontend (UI / React)
        - Backend (API)
        - Contracts (Soroban / Rust)
        - CI / DevOps
        - Documentation
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add mockups, references, or examples here
